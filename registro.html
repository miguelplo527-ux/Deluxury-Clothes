<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro | Deluxury Clothes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>

<div class="container-fluid vh-100 p-0">
    <div class="row g-0 h-100">
        
        <div class="col-md-6 col-lg-7 d-none d-md-block visual-side">
            </div>

        <div class="col-12 col-md-6 col-lg-5 d-flex flex-column justify-content-center px-4 px-md-5 py-5 m-auto" style="max-width: 480px;">
            
            <div class="mb-3 text-start">
                <img src="./img/1000120932.jpg" alt="Logo" class="logo-login img-fluid" style="max-height: 45px;">
            </div>

            <p class="text-muted small mb-1">Únete a nosotros</p>
            <h2 class="fw-bold mb-4">Crear Cuenta</h2>

            <form onsubmit="validarYRegistrar(event)">
                
                <div class="form-floating mb-3">
                    <select id="rol" class="form-select" required>
                        <option value="" selected disabled>Seleccione un rol</option>
                        <option value="Administrador">Administrador</option>
                        <option value="Cliente">Cliente</option>
                    </select>
                    <label for="rol"><i class="bi bi-person-badge me-2"></i>Selecciona tu Rol</label>
                </div>

                <div class="form-floating mb-3">
                    <input type="text" id="nombre" class="form-control" placeholder="Tu nombre" required>
                    <label for="nombre"><i class="bi bi-person me-2"></i>Nombre Completo</label>
                </div>

                <div class="form-floating mb-3">
                    <input type="email" id="correo" class="form-control" placeholder="correo@ejemplo.com" required>
                    <label for="correo"><i class="bi bi-envelope me-2"></i>Correo Electrónico</label>
                </div>

                <div class="form-floating mb-4 position-relative">
                    <input type="password" id="password" class="form-control" placeholder="Crea una contraseña" required>
                    <label for="password"><i class="bi bi-lock me-2"></i>Contraseña</label>
                    <button type="button" class="btn position-absolute top-50 end-0 translate-middle-y me-2 border-0 bg-transparent text-muted" onclick="togglePassword()">
                        <i class="bi bi-eye" id="toggleIcon"></i>
                    </button>
                </div>
        
                <button type="submit" class="btn btn-primary w-100 fw-bold py-2.5 mb-3">
                    Registrarse
                </button>
            </form>

            <div class="text-center">
                <a href="./login.html" class="text-decoration-none small text-muted fw-semibold">
                    Ya tengo cuenta, iniciar sesión
                </a>
            </div>
        </div>

    </div>
</div>

<script>

function togglePassword() {
    const passwordInput = document.getElementById('password');
    const toggleIcon = document.getElementById('toggleIcon');
    
    if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        toggleIcon.classList.remove('bi-eye');
        toggleIcon.classList.add('bi-eye-slash');
    } else {
        passwordInput.type = 'password';
        toggleIcon.classList.remove('bi-eye-slash');
        toggleIcon.classList.add('bi-eye');
    }
}
function validarYRegistrar(event) {
    event.preventDefault(); 
    
    const rol = document.getElementById('rol').value;
    
    if (rol === "") {
        alert("Por favor, selecciona un rol válido (Administrador o Cliente).");
        return;
    }
    
    if (typeof registrar === 'function') {
        registrar();
    } else {
        console.log("Formulario válido. Ejecutando lógica de registro...");
    }
}
</script>

<script src="./java.js"></script> 
</body>
</html>
