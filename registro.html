<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro | Deluxury Clothes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
</head>
<body class="bg-light">

<div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">
    <div class="card p-4 shadow-sm text-center" style="max-width: 400px; width: 100%; border: none; border-radius: 12px;">
        
        <img src="./img/1000120932.jpg" alt="Logo" class="rounded-circle mx-auto mb-3" style="width: 80px; height: 80px; object-fit: cover;">
        <h2 class="fw-bold mb-4">Crear Cuenta</h2>

        <div class="text-start">
            <label class="form-label small fw-bold">Selecciona tu Rol</label>
            <select id="rol" class="form-select mb-3">
                <option value="">Seleccione un rol</option>
                <option value="Administrador">Administrador</option>
                <option value="Vendedor">Vendedor</option>
                <option value="Cliente">Cliente</option>
            </select>

            <label class="form-label small fw-bold">Nombre Completo</label>
            <input type="text" id="nombre" class="form-control mb-3" placeholder="Tu nombre">

            <label class="form-label small fw-bold">Correo Electrónico</label>
            <input type="email" id="correo" class="form-control mb-3" placeholder="correo@ejemplo.com">

            <label class="form-label small fw-bold">Contraseña</label>
            <input type="password" id="password" class="form-control mb-4" placeholder="Crea una contraseña">
        </div>

        <button class="btn btn-success w-100 fw-bold py-2 mb-3" onclick="registrar()">
            Registrarse
        </button>

        <a href="./login.html" class="text-decoration-none small text-muted d-block">
            Ya tengo cuenta, iniciar sesión
        </a>
    </div>
</div>

<script src="./java.js"></script>
</body>
</html>
