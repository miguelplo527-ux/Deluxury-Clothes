<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>

<div class="container">

    <div class="login-box">

        <img src="./img/1000120932.jpg" class="logo-login">

        <h2>Crear Cuenta</h2>

        <input type="text"
               class="form-control mb-3"
               placeholder="Nombre">

        <input type="email"
               class="form-control mb-3"
               placeholder="Correo">

        <input type="password"
               class="form-control mb-3"
               placeholder="Contraseña">

        <button class="btn btn-success w-100">
            Registrarse
        </button>

        <br><br>

        <a href="login.html">
            Ya tengo cuenta
        </a>

    </div>

</div>

</body>
</html>
