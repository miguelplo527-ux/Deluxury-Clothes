<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Deluxury</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>

<div class="container-fluid vh-100 p-0">
    <div class="row g-0 h-100">
        
        <div class="col-10 col-md-6 col-lg-5 m-auto d-flex flex-column justify-content-center px-4 px-md-5 py-5">
            
            <div class="mb-4">
                <img src="../img/1000120932.jpg" alt="Logo Deluxury" class="logo-login img-fluid" style="max-height: 40px;">
            </div>

            <p class="text-muted small mb-1">Comienza tu viaje</p>
            <h2 class="fw-bold mb-4">Iniciar Sesión en Deluxury</h2>

            <form onsubmit="loginUsuario(event)">
                <div class="form-floating mb-3">
                    <input type="email" class="form-control" id="email" placeholder="name@example.com" required>
                    <label for="email"><i class="bi bi-envelope me-2"></i>Correo Electrónico</label>
                </div>
                
                <div class="form-floating mb-3 position-relative">
                    <input type="password" class="form-control" id="password" placeholder="Contraseña" required>
                    <label for="password"><i class="bi bi-lock me-2"></i>Contraseña</label>
                    <button type="button" class="btn position-absolute top-50 end-0 translate-middle-y me-2 border-0 bg-transparent text-muted" onclick="togglePassword()">
                        <i class="bi bi-eye" id="toggleIcon"></i>
                    </button>
                </div>
        
                <button type="submit" class="btn btn-primary w-100 py-2.5 fw-semibold mb-4">Iniciar Sesión</button>
            </form>

            

            <div class="text-center mt-3">
                <span class="text-muted small">¿No tienes cuenta? <a href="./registro.html" class="text-decoration-none fw-semibold">Regístrate</a></span>
            </div>
        </div>

        <div class="col-md-6 col-lg-7 d-none d-md-block visual-side">
            </div>

    </div>
</div>

<script>
function togglePassword() {
    const passwordInput = document.getElementById('password');
    const toggleIcon = document.getElementById('toggleIcon');
    
    if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        toggleIcon.classList.remove('bi-eye');
        toggleIcon.classList.add('bi-eye-slash');
    } else {
        passwordInput.type = 'password';
        toggleIcon.classList.remove('bi-eye-slash');
        toggleIcon.classList.add('bi-eye');
    }
}
</script>

<script src="./js/java.js"></script>
</body>
</html>
