<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Deluxury</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>

<div class="container py-5">
    <div class="login-box m-auto" style="max-width: 400px;">
        <img src="./img/1000120932.jpg" class="logo-login img-fluid d-block mx-auto mb-3" style="max-width: 150px;">
        <h2 class="text-center mb-4">Iniciar Sesión</h2>

        <form onsubmit="loginUsuario(event)">
            <div class="mb-3">
                <label for="email" class="form-label">Correo Electrónico</label>
                <input type="email" class="form-control" id="email" required>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Contraseña</label>
                <input type="password" class="form-control" id="password" required>
            </div>
    
            <button type="submit" class="btn btn-primary w-100">Iniciar Sesión</button>
        </form>

        <div class="text-center">
            <a href="./registro.html">¿No tienes cuenta? Regístrate</a>
        </div>
    </div>
</div>

<script src="./java.js"></script>
</body>
</html>
